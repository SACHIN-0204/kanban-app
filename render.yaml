# Render Blueprint - deploys the backend web service and a managed Postgres
# database together. In the Render dashboard: New -> Blueprint -> point at
# this repo, and Render will provision both resources defined below.
#
# After the first deploy, run the migration once via the Render Shell tab
# on the web service: npm run migrate

services:
  - type: web
    name: kanban-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kanban-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        # Update this after the frontend is deployed to Vercel, e.g.
        # https://your-app.vercel.app - CORS will reject requests until this
        # matches your actual frontend URL.
        value: https://your-app.vercel.app

databases:
  - name: kanban-db
    plan: free
